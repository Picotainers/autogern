name: Build and Publish AutoGERN

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build smoke-test image
        run: docker build -t picotainers-local/autogern:smoke .

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run --rm picotainers-local/autogern:smoke --help > smoke.txt 2>&1 || true
          cat smoke.txt
          grep -Eiq 'Interface for AutoGERN framework|usage:' smoke.txt

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: picotainers/autogern:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
